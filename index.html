<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07090c" />
    <meta
      name="description"
      content="LoopsBench: a long-horizon benchmark for loop engineering in coding agent evaluation. 112 dependency-DAG tasks, 5,300+ development units, flow-aware evaluation."
    />
    <title>LoopsBench — Loop Engineering in Coding Agent Evaluation</title>
    <script>
      (function () {
        var url = new URL(window.location.href);
        var route = url.searchParams.get("p");

        if (!route) {
          return;
        }

        var query = url.searchParams.get("q");
        var hash = url.searchParams.get("h");
        var basePrefix =
          url.pathname === "/" ? "" : url.pathname.replace(/\/$/, "");
        var nextUrl =
          basePrefix +
          route +
          (query ? "?" + query : "") +
          (hash ? "#" + hash : "");

        window.history.replaceState(null, "", nextUrl || "/");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
